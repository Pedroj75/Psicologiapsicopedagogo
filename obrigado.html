<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagem enviada – Pedro Alcântara Psicólogo</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sage: #4a7c6f;
    --sage-light: #e8f0ee;
    --sage-dark: #2e5248;
    --warm: #f5f0ea;
    --accent: #c17f4a;
    --muted: #6b7c78;
    --white: #fff;
    --border: rgba(74,124,111,0.18);
  }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; text-align: center;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 480px; width: 100%;
    box-shadow: 0 8px 40px rgba(46,82,72,0.08);
  }
  .icon {
    width: 72px; height: 72px;
    background: var(--sage-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2rem;
  }
  h1 { font-family: 'Lora', serif; font-size: 1.8rem; color: var(--sage-dark); margin-bottom: 0.75rem; }
  h1 em { font-style: italic; color: var(--accent); }
  p { font-size: 0.95rem; color: var(--muted); line-height: 1.7; margin-bottom: 1rem; }
  .timer { font-size: 0.85rem; color: var(--sage); font-weight: 500; margin-bottom: 2rem; }
  .btn-wpp {
    display: inline-flex; align-items: center; gap: 10px;
    background: #25D366; color: white;
    padding: 14px 28px; border-radius: 10px;
    text-decoration: none; font-weight: 500; font-size: 1rem;
    transition: opacity 0.2s; margin-bottom: 1rem; width: 100%; justify-content: center;
  }
  .btn-wpp:hover { opacity: 0.9; }
  .btn-voltar {
    display: inline-block;
    font-size: 0.85rem; color: var(--muted);
    text-decoration: none; margin-top: 0.5rem;
    transition: color 0.2s;
  }
  .btn-voltar:hover { color: var(--sage); }
  .logo { font-family: 'Lora', serif; font-size: 0.95rem; color: var(--sage-dark); margin-top: 2rem; opacity: 0.5; }
  .logo span { color: var(--accent); }
  #countdown { font-weight: 700; color: var(--accent); }
</style>
</head>
<body>

<div class="card">
  <div class="icon">✅</div>
  <h1>Mensagem <em>enviada!</em></h1>
  <p>Obrigado pelo contato. Em instantes o WhatsApp vai abrir para você continuar a conversa com Pedro Alcântara.</p>
  <p class="timer">Abrindo automaticamente em <span id="countdown">5</span> segundos...</p>
  <a class="btn-wpp" id="wpp-btn" href="#" target="_blank">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.527 5.845L.057 23.714l6.016-1.456A11.935 11.935 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.015-1.373l-.358-.214-3.725.902.934-3.632-.234-.372A9.818 9.818 0 0 1 2.182 12C2.182 6.58 6.58 2.182 12 2.182S21.818 6.58 21.818 12 17.42 21.818 12 21.818z"/></svg>
    Abrir WhatsApp agora
  </a>
  <br>
  <a class="btn-voltar" href="https://psicopedroalcantara.com.br">← Voltar ao site</a>
</div>

<div class="logo">Pedro <span>Alcântara</span></div>

<script>
  // Pega a mensagem que veio da URL (passada pelo index.html via sessionStorage)
  const msg = sessionStorage.getItem('wpp_msg') || 'Olá, gostaria de agendar uma consulta.';
  const wppUrl = `https://wa.me/5534984037267?text=${encodeURIComponent(msg)}`;
  document.getElementById('wpp-btn').href = wppUrl;

  // Countdown e abertura automática
  let segundos = 5;
  const contador = document.getElementById('countdown');
  const interval = setInterval(() => {
    segundos--;
    contador.textContent = segundos;
    if (segundos <= 0) {
      clearInterval(interval);
      window.open(wppUrl, '_blank');
    }
  }, 1000);
</script>

</body>
</html>
